<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
  <script>
const sound = new Audio('sounds/Hashira_Meeting_Theme.mp3');

// Listen for a click or touch and play immediately
window.addEventListener('click', () => {
    sound.play().catch(error => {
        console.error("Playback failed:", error);
    });
}, { once: true }); // This ensures it only triggers on the first interaction
  </script>
</head>
<body>
<div class="container">
<p>
The doors shift.
The space bends.

You found the one who controls it all.

Few make it this far.

You did.

Welcome to the Demon Slayer Corps.
</p>
</div>
</div>
</body>
</html>
